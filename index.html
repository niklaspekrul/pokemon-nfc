<!DOCTYPE html>
<html lang="de">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's That Pokémon?</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    text-align:center;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

h2{
    font-size:28px;
    margin-bottom:25px;
}

img{

<body>

<div class="footer">
Viel Spaß beim Sammeln! ❤️<br><br>

<script>
