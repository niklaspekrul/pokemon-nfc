<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NiklasCards Surprise</title>

<style>

body{

margin:0;
padding:40px;
background:#111827;
font-family:Arial;
color:white;
text-align:center;

}

.card{

max-width:700px;
margin:auto;
background:#1f2937;
padding:30px;
border-radius:20px;

}

img{

width:100%;
border-radius:15px;
margin-top:25px;

}

h1{

color:#FFD700;

}

p{

font-size:20px;

}

</style>

</head>

<body>

<div class="card">

<h1>🎁 Danke für deine Bestellung!</h1>

<p>Deine Überraschungskarte:</p>

<img id="pokemon">

<p>Ich wünsche dir viel Spaß beim Sammeln! ❤️</p>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

document.getElementById("pokemon").src="bilder/"+id+".jpg";

</script>

</body>
