<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiklasCards Überraschung</title>

    <style>
        body{
            margin:0;
            background:#0f172a;
            font-family:Arial, Helvetica, sans-serif;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{
            width:90%;
            max-width:600px;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,.4);
        }

        h1{
            color:#FFD700;
            margin-top:0;
        }

        img{
            width:100%;
            border-radius:15px;
            margin:20px 0;
        }

        p{
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🎁 Danke für deine Bestellung!</h1>

<p>Deine Überraschungskarte</p>

<img id="pokemon" src="" alt="Pokémon Karte">

<p>Viel Spaß beim Sammeln! ❤️</p>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "001";

const img = document.getElementById("pokemon");

img.onerror = function () {

    img.onerror = null;
    img.src = "bilder/" + id + ".png";

};

img.src = "bilder/" + id + ".jpg";

</script>

</body>
</html>
